version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: nestwise-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - BROWSER=none
      - FAST_REFRESH=true
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=0
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: ./.env
    command: npm start
    networks:
      - nestwise-network

  middleman-api:
    build:
      context: ./services/middle-man-api
      dockerfile: Dockerfile.dev
    container_name: nestwise-middleman-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./services/middle-man-api:/app
      - /app/src/Middle.Man.Api/bin        
      - /app/src/Middle.Man.Api/obj        
      - /app/src/Middle.Man.Core/bin       
      - /app/src/Middle.Man.Core/obj       
      - /app/src/Middle.Man.Infrastructure/bin 
      - /app/src/Middle.Man.Infrastructure/obj
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORE_API_URL=http://nestwise-core-api:8081
      - AI_SERVICE_URL=http://ai-service:8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=nestwise
      - DB_USER=nestwise
      - DB_PASSWORD=password
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=true
    command: dotnet watch --project src/Middle.Man.Api/Middle.Man.Api.csproj run
    depends_on:
      - postgres
    networks:
      - nestwise-network

  nestwise-core-api:
    build:
      context: ./services/nestwise-core-api
      dockerfile: Dockerfile.dev
    container_name: nestwise-core-api
    ports:
      - "8081:8081"
    volumes:
      - ./services/nestwise-core-api:/app
      - /app/bin
      - /app/obj
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=nestwise
      - DB_USER=nestwise
      - DB_PASSWORD=password
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8081
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=true
    command: dotnet watch --project nestwise-core-api.csproj run
    depends_on:
      - postgres
    networks:
      - nestwise-network

  ai-service:
    build:
      context: ./services/ai-service
    container_name: nestwise-ai-service
    ports:
      - "8082:8082"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: http://qdrant:6333
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nestwise
      DB_USER: nestwise
      DB_PASSWORD: password
    depends_on:
      - qdrant
      - postgres
    networks:
      - nestwise-network

  dashboard-service:
    build:
      context: ./services/dashboard-service
      dockerfile: Dockerfile.dev 
    container_name: nestwise-dashboard
    ports:
      - "3001:3000"
    volumes:
      - ./services/dashboard-service:/app
      - /app/bin
      - /app/obj
    environment:
      - API_URL=http://middleman-api:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:3000
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER=true
    command: dotnet watch --project dashboard-service.csproj run
    depends_on:
      - middleman-api
    networks:
      - nestwise-network

  postgres:
    image: postgres:16
    container_name: nestwise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nestwise
      POSTGRES_USER: nestwise
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nestwise-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nestwise-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - nestwise-network

networks:
  nestwise-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
